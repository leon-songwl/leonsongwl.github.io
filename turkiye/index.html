:root{
  --ink:#1c1330;--ink-soft:#5d5274;--ink-faint:#9a8fac;
  --cream:#fbf1e2;--paper:#fff9f0;--sand:#f5e8d4;
  --coral:#ff6b5a;--coral-d:#e8503f;--coral-soft:#fff0ec;
  --amber:#f6a83f;--gold:#ffd27a;--teal:#27b8a6;--teal-soft:#e6f7f4;
  --rose:#f3c9bf;--indigo:#4a57c8;
  --green:#2faa6a;--green-soft:#e7f5ee;--amber-soft:#fdf2dd;
  --line:#ecdcc6;--line-soft:#f3e9da;
  --disp:'Fraunces',Georgia,'Times New Roman',serif;
  --body:'Outfit',system-ui,-apple-system,'Segoe UI',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--sheet-ease:cubic-bezier(.22,.9,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--body);color:var(--ink);background:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh;position:fixed;inset:0}
button{-webkit-tap-highlight-color:transparent;font-family:var(--body)}
em{font-style:italic}

.screen{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--cream);transition:transform .4s var(--ease),opacity .4s var(--ease);will-change:transform,opacity}
.screen.behind{transform:translateX(-24%);opacity:.35;pointer-events:none}
.screen.ahead{transform:translateX(100%);pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

.app-hdr{position:sticky;top:0;z-index:50;background:rgba(28,19,48,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:11px 18px;padding-top:max(11px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between}
.app-hdr .brand{font-family:var(--disp);font-weight:600;font-size:15.5px;color:#fff;display:flex;align-items:center;gap:8px}
.app-hdr .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 3px rgba(255,107,90,.25)}
.app-hdr .dates{font-size:10.5px;color:rgba(255,255,255,.5);font-weight:500}

.hero{position:relative;overflow:hidden;height:368px;background:linear-gradient(178deg,#221836 0%,#3a2350 20%,#6e3559 41%,#bd5a52 60%,#ec8a4e 77%,#f8b461 89%,#ffd482 100%)}
.sun{position:absolute;left:50%;bottom:34px;width:340px;height:340px;transform:translateX(-50%);background:radial-gradient(circle,rgba(255,236,186,.92) 0%,rgba(255,206,128,.5) 32%,rgba(255,190,110,0) 68%);pointer-events:none}
.chimneys{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:120px;display:block}
.balloon{position:absolute;z-index:2;filter:drop-shadow(0 10px 12px rgba(60,20,40,.28));animation:drift 11s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.hero-copy{position:absolute;z-index:4;left:20px;right:20px;bottom:30px}
.hero-copy .eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:#ffe6b8;font-weight:600;margin-bottom:9px;text-shadow:0 1px 8px rgba(60,20,40,.4)}
.hero-copy h1{font-family:var(--disp);font-weight:600;font-size:30px;line-height:1.08;color:#fff;letter-spacing:-.01em;text-wrap:balance;text-shadow:0 2px 18px rgba(50,15,35,.4)}
.hero-copy h1 em{color:#ffd9cf}
.hero-copy .sub{font-size:13.5px;color:rgba(255,255,255,.82);margin-top:11px;max-width:330px;line-height:1.5;text-shadow:0 1px 10px rgba(50,15,35,.35)}

.week-body{padding:16px 14px 44px}
.section-eyebrow{display:flex;align-items:center;gap:8px;margin:4px 2px 12px}
.section-eyebrow .k{font-family:var(--disp);font-size:12px;color:var(--coral);font-weight:600}
.section-eyebrow .ln{flex:1;height:1px;background:var(--line)}

.presets{background:linear-gradient(135deg,#fff9f0,#fdf2e3);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:18px;box-shadow:0 10px 30px -22px rgba(60,20,40,.5)}
.presets .pl{font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-bottom:10px;line-height:1.4}
.presets .pl b{color:var(--ink);font-weight:600}
.preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.preset-row::-webkit-scrollbar{display:none}
.pbtn{flex:0 0 auto;font-size:12.5px;font-weight:600;border:1px solid #f0dcbb;background:#fff;color:#a86a12;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.14s}
.pbtn:active{background:var(--gold);border-color:var(--amber);transform:scale(.96)}
.pbtn.hm{color:#1c8475;border-color:#bfe6df}.pbtn.hm:active{background:#d7f1ec}
.pbtn.gh{color:var(--ink-faint);border-color:var(--line)}

.dcard{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:16px;margin-bottom:11px;cursor:pointer;overflow:hidden;box-shadow:0 8px 24px -20px rgba(60,20,40,.5);transition:transform .14s}
.dcard:active{transform:scale(.985)}
.dcard .accent{height:4px;width:100%}
.dcard.lock .accent{background:linear-gradient(90deg,var(--green),#5fc98e)}
.dcard.flex .accent{background:repeating-linear-gradient(90deg,var(--amber) 0 8px,#fbe0a8 8px 15px)}
.dcard.choice .accent{background:linear-gradient(90deg,var(--teal),#5fd0c2)}
.dcard .inner{padding:13px 15px 14px}
.dc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dc-date{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.badge{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap}
.bg-lock{background:var(--green-soft);color:#1c6e45}.bg-flex{background:var(--amber-soft);color:#9a6a14}.bg-choice{background:var(--teal-soft);color:#1c8475}
.dc-title{font-family:var(--disp);font-weight:600;font-size:17px;margin-top:5px;line-height:1.18}
.dc-core{font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:1.45}
.dc-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}
.dc-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;background:#fff;border:1px solid var(--line-soft);color:var(--ink-soft);padding:3px 8px 3px 5px;border-radius:999px}
.dc-chip .e{font-size:12px}.dc-chip.more{color:var(--ink-faint);font-style:italic;padding-left:8px}
.dc-empty{font-size:12.5px;color:var(--ink-faint);font-style:italic;margin-top:8px}
.dc-foot{display:flex;align-items:center;gap:6px;font-size:11.5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft)}
.dc-foot .ic{font-size:13px}.dc-foot .hn{color:var(--ink-soft);font-weight:600}.dc-foot .none{color:var(--amber);font-weight:500}
.ctog{display:flex;gap:6px;margin-top:11px}
.ctog button{flex:1;font-size:11px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:8px 6px;border-radius:9px;cursor:pointer;line-height:1.15}
.ctog button.on{background:var(--teal);border-color:var(--teal);color:#fff}

.tease-row{display:flex;gap:10px;margin-top:6px}
.tease{flex:1;border-radius:16px;padding:15px 14px;cursor:pointer;position:relative;overflow:hidden;transition:transform .14s}
.tease:active{transform:scale(.97)}
.tease.map{background:linear-gradient(150deg,#2a1f44,#1c1330);color:#fff}
.tease.share{background:linear-gradient(150deg,#fff9f0,#fbeede);border:1px solid var(--line);color:var(--ink)}
.tease .ic{font-size:22px;display:block;margin-bottom:7px}
.tease .lb{font-family:var(--disp);font-weight:600;font-size:14.5px;line-height:1.1}

let mapView='trip',detailId=null,detailStay=false,map=null,markersLayer=null,lineLayer=null,mapReady=false;
const LS='turkiye_plan_v1';

/* ===================== HELPERS ===================== */
function dObj(id){return DAYS.find(d=>d.id===id)}
function dShort(d){return d.date.split(' ')[0]}
function grad(cat){const c=GRAD[cat]||['#cdbfae','#8a6a4a'];return `linear-gradient(145deg,${c[0]},${c[1]})`}
function col(cat){return (GRAD[cat]||['#cdbfae'])[0]}
function isStayPlace(id){return STAY_SET.has(id)||(P[id]&&P[id].cat==='hotel')}
function gmapsHint(id){const v=(P[id]&&P[id].views)||[];if(v.includes('capp')||/^cp|^ho/.test(id))return 'Cappadocia, Türkiye';if(v.includes('afyon')||/^af/.test(id))return 'Afyonkarahisar, Türkiye';return 'Türkiye'}
function gmaps(id){const p=P[id];if(!p)return '#';if(p.url)return p.url;
  if(p.pid)return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}&query_place_id=${p.pid}`;
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+', '+gmapsHint(id))}`}
function hav(a,b){const R=6371,dLa=(b.lat-a.lat)*Math.PI/180,dLo=(b.lng-a.lng)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180;const h=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(h))}
function legKm(a,b){return Math.round(hav(a,b)*1.3)}
function dayKm(id){const it=state.itin[id].filter(x=>P[x]&&P[x].lat!=null);let t=0;for(let i=0;i<it.length-1;i++)t+=legKm(P[it[i]],P[it[i+1]]);return t}
function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1700)}
function val(id){return (document.getElementById(id).value||'').trim()}
function dayTitle(d){if(d.id==='d6')return state.flex==='cappadocia'?'Cappadocia — one more day':'Begin the journey home';return d.title}
function badgeFor(d){return d.kind==='lock'?'<span class="badge bg-lock">✓ All set</span>':d.kind==='flex'?'<span class="badge bg-flex">✨ Your day</span>':'<span class="badge bg-choice">🔀 Your call</span>'}
function staysFor(d){if(d.sleep==='afyon')return AF_HOTELS.map(o=>o.id);if(d.sleep==='capp')return HOTELS.map(o=>o.id);if(d.sleep==='choice')return (state.flex==='home'?HOME_TOWNS:HOTELS).map(o=>o.id);return []}
function coverStyle(p){return p.photo?`background-image:url('${p.photo}')`:`background:${grad(p.cat)}`}
function mapOpen(){return document.getElementById('mapOv').classList.contains('open')}

/* ===================== WEEK ===================== */
function renderWeek(){
  const cards=DAYS.map(d=>{
    const it=state.itin[d.id],sl=state.sleep[d.id],kc=d.kind==='lock'?'lock':d.kind==='flex'?'flex':'choice';
    let inner=`<div class="dc-top"><span class="dc-date">${d.date}</span>${badgeFor(d)}</div><div class="dc-title">${dayTitle(d)}</div>`;
    if(d.core)inner+=`<div class="dc-core">${d.core}</div>`;
    if(it.length){
      const chips=it.slice(0,3).map(id=>{const p=P[id]||{em:'📍',name:id};return `<span class="dc-chip"><span class="e">${p.em}</span>${p.name}</span>`}).join('');
      inner+=`<div class="dc-chips">${chips}${it.length>3?`<span class="dc-chip more">+${it.length-3} more</span>`:''}</div>`;
    }else if(d.kind!=='lock'){inner+=`<div class="dc-empty">✨ Tap to start planning this day</div>`}
    if(d.id==='d6'){const stay=state.flex==='cappadocia';
      inner+=`<div class="ctog"><button class="${stay?'on':''}" onclick="event.stopPropagation();toggleFlex('cappadocia')">🏔 Stay a day</button><button class="${!stay?'on':''}" onclick="event.stopPropagation();toggleFlex('home')">🚗 Head home</button></div>`}
    if(d.sleep!=='none'){
      if(sl&&P[sl])inner+=`<div class="dc-foot"><span class="ic">🛏</span><span class="hn">${P[sl].name}</span></div>`;
      else inner+=`<div class="dc-foot"><span class="ic">🛏</span><span class="none">Where we sleep — not chosen yet</span></div>`;
    }
    return `<div class="dcard ${kc}" onclick="showDay('${d.id}')"><div class="accent"></div><div class="inner">${inner}</div></div>`;
  }).join('');
  document.getElementById('weekScreen').innerHTML=`
    <div class="app-hdr"><span class="brand"><span class="dot"></span>Türkiye · the two of us</span><span class="dates">31 Aug – 6 Sep</span></div>
    <div class="hero"><div class="sun"></div>${balloonsHTML()}
      <svg class="chimneys" viewBox="0 0 390 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 120 V70 Q14 40 28 70 V120 Z M40 120 V58 Q46 30 52 40 Q58 24 66 44 Q72 30 78 58 V120 Z M150 120 V64 Q160 34 170 64 V120 Z M300 120 V60 Q308 36 316 60 V120 Z" fill="#41264f" opacity=".85"/>
        <path d="M95 120 V80 Q104 44 113 62 Q120 40 128 64 V120 Z M210 120 V72 Q220 38 230 60 Q236 42 244 72 V120 Z M250 120 V84 Q258 52 266 84 V120 Z M340 120 V66 Q350 36 360 66 V120 Z M372 120 V78 Q380 52 388 78 V120 Z" fill="#2a1a3a"/></svg>
      <div class="hero-copy"><div class="eyebrow">Our week · flying into Istanbul</div>
        <h1>Hot springs, fairy chimneys<br>& <em>balloons at sunrise</em></h1>
        <p class="sub">The long drives are taken care of. The rest is ours to choose — wander, save what you love, and build the days that feel like us. 🤍</p></div>
    </div>
    <div class="week-body">
      <div class="presets"><div class="pl"><b>✨ Want a head start?</b> Try a ready-made plan, then change anything:</div>
        <div class="preset-row">
          <button class="pbtn" onclick="event.stopPropagation();applyPreset('hits')">🎈 Greatest hits</button>
          <button class="pbtn" onclick="event.stopPropagation();applyPreset('romantic')">💞 Slow & romantic</button>
          <button class="pbtn" onclick="event.stopPropagation();applyPreset('adventure')">🧗 Adventure</button>
          <button class="pbtn hm" onclick="event.stopPropagation();presetHome()">🧭 Suggested way home</button>
          <button class="pbtn gh" onclick="event.stopPropagation();clearAll()">Start fresh</button></div></div>
      <div class="section-eyebrow"><span class="k">Our seven days</span><span class="ln"></span></div>
      ${cards}
      <div class="tease-row">
        <div class="tease map" onclick="openMap('trip')"><span class="deco">🗺</span><span class="ic">🗺</span><div class="lb">See it on a map</div><div class="ht">Our whole journey, pins and all</div></div>
        <div class="tease share" onclick="openShare()"><span class="ic">🔗</span><div class="lb">Share our plan</div><div class="ht">Send a link — they see everything</div></div></div>
    </div>`;
}
function balloonsHTML(){
  const B=[{t:6,l:9,w:56,c:['#ff8f6e','#ff5a7a'],d:0,du:11},{t:15,l:63,w:46,c:['#ffd27a','#f6a83f'],d:1.4,du:12.5},{t:5,l:40,w:30,c:['#7fe3d6','#27b8a6'],d:2.8,du:10},{t:27,l:28,w:24,c:['#f3c9bf','#e0897a'],d:1,du:13},{t:23,l:82,w:34,c:['#ffe0a0','#ffb357'],d:3.4,du:11.5},{t:38,l:7,w:19,c:['#c4a9ec','#8a6ad0'],d:.6,du:9.5},{t:12,l:88,w:17,c:['#ffb0a0','#ff7a6a'],d:2.2,du:12}];
  return B.map((b,i)=>`<svg class="balloon" style="top:${b.t}%;left:${b.l}%;width:${b.w}px;animation-delay:${b.d}s;animation-duration:${b.du}s" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${b.c[0]}"/><stop offset="1" stop-color="${b.c[1]}"/></linearGradient></defs><path d="M30 2C13 2 4 15 4 30c0 16 14 26 22 33h8c8-7 22-17 22-33C56 15 47 2 30 2Z" fill="url(#bg${i})"/><path d="M30 2v61M15 7c1 22 6 41 11 54M45 7c-1 22-6 41-11 54" stroke="rgba(255,255,255,.35)" stroke-width="1" fill="none"/><path d="M23 60h14l-2.5 9H25.5z" fill="#2a1a3a"/></svg>`).join('');
}

/* ===================== DAY DETAIL ===================== */
function renderDay(){
  const d=dObj(activeDay),it=state.itin[d.id],sl=state.sleep[d.id];
  let body=`<div class="day-hd-title">${dayTitle(d)}</div>`;
  if(d.core)body+=`<div class="day-core">${d.core}</div>`;
  if(d.id==='d6'){const stay=state.flex==='cappadocia';
    body+=`<div class="ctog-detail"><button class="${stay?'on':''}" onclick="toggleFlex('cappadocia')">🏔 Stay one more day</button><button class="${!stay?'on':''}" onclick="toggleFlex('home')">🚗 Start heading home<span class="rec">easy pick</span></button></div>`;
    body+=`<div class="choice-note">${stay?'🎈 One more day in the valleys — then a longer drive back on Sunday, so leave early.':'🚗 Head off after breakfast and sleep in a pretty Ottoman town — a calm, two-day way home.'}</div>`}
  if(it.length){
    const rows=it.map((id,i)=>{const p=P[id]||{name:id,em:'📍',cat:'custom'};
      return `<div class="irow" onclick="openDetail('${id}',false)"><span class="inum">${i+1}</span><div class="icover-sm" style="${coverStyle(p)}">${p.photo?'':p.em}</div><div class="iinf"><div class="iname">${p.name}</div><div class="imeta">${p.r?`<span class="star">${p.r} ★</span> · `:''}${p.cat==='custom'?'your find':'tap to learn more'}</div></div><div class="ictrl"><button onclick="event.stopPropagation();moveItem('${d.id}',${i},-1)">▲</button><button onclick="event.stopPropagation();moveItem('${d.id}',${i},1)">▼</button><button onclick="event.stopPropagation();rmItem('${d.id}',${i})">✕</button></div></div>`}).join('');
    const km=dayKm(d.id);
    body+=`<div class="items-sec"><div class="sec-label">Your plan · ${it.length} stop${it.length>1?'s':''}</div>${rows}${km?`<div class="dist-line">📍 ≈ ${km} km in this order</div>`:''}<button class="clear-day" onclick="clearDay()">clear this day</button></div>`;
  }else if(d.kind!=='lock'){
    body+=`<div class="empty-invite"><div class="big">✨</div><p>A blank, beautiful day. Tap <b>＋ Add something</b> to start building it — or go back and try a ready-made plan.</p></div>`;
  }
  if(d.sleep!=='none'){
    let inner;
    if(sl&&P[sl])inner=`<div class="stay-card" onclick="openDetail('${sl}',true)"><div class="scov">${P[sl].em}</div><div class="si"><div class="sn">${P[sl].name}</div><div class="sm">${P[sl].r?P[sl].r+' ★ · ':''}tap to see it · or change</div></div><span class="chg">Change ›</span></div>`;
    else inner=`<button class="choose-stay" onclick="openSheet('stay')">🛏 Choose where we sleep</button>`;
    body+=`<div class="sleep-sec"><div class="sec-label">Where we sleep that night</div>${inner}</div>`;
  }
  document.getElementById('dayScreen').innerHTML=`
    <div class="day-bar"><button class="back-btn" onclick="showWeek()">‹</button><span class="dt">${d.date}</span>${badgeFor(d)}</div>
    <div class="day-body">${body}</div>
    <div class="day-foot"><button class="add-btn" onclick="openSheet('act')">＋ Add something</button><button class="mapbtn" onclick="openMap('day')">🗺</button></div>`;
  document.getElementById('dayScreen').scrollTop=0;
}

/* ===================== SHEET ===================== */
function openSheet(mode){sheetMode=mode;sheetTab='browse';sheetFilter='All';renderSheet();document.getElementById('backdrop').classList.add('open');document.getElementById('sheet').classList.add('open')}
function closeSheet(){document.getElementById('backdrop').classList.remove('open');document.getElementById('sheet').classList.remove('open')}
function setSheetTab(t){sheetTab=t;renderSheet()}
function setFilter(f){sheetFilter=f;renderSheet()}
function pickEmoji(e){selEmoji=e;renderSheet()}
function byRating(ids){return ids.slice().sort((a,b)=>((P[b]&&P[b].r)||4.3)-((P[a]&&P[a].r)||4.3))}
function renderSheet(){
  const d=dObj(activeDay),isStay=sheetMode==='stay';
  const title=isStay?`Where to sleep · ${dShort(d)}`:`Ideas for ${dShort(d)} ${d.date.split(' ')[2]}`;
  const sub=isStay?'Pick a place, or add your own — it lands on the map too.':'Browse what we found, or add a place you discovered.';
  let head=`<div class="sh-handle"></div><div class="sh-hdr"><div class="sh-title">${title}</div><div class="sh-sub">${sub}</div><div class="sh-tabs"><button class="sh-tab ${sheetTab==='browse'?'on':''}" onclick="setSheetTab('browse')">${isStay?'Places to stay':'Browse ideas'}</button><button class="sh-tab ${sheetTab==='own'?'on':''}" onclick="setSheetTab('own')">＋ Add your own</button></div></div>`;
  let content;
  if(sheetTab==='own'){
    const emo=isStay?['🛏️','🏨','🏡','⛺','🕌','🌟']:['📍','🍽️','☕','🍷','🏛️','🏰','🥾','🍄','🌅','🛍️','🎨','💜'];
    content=`<div class="sh-scroll"><div class="own-form">
      <div class="own-lead">${isStay?'Found a hotel you love? Add it and it becomes where we sleep — pin and all.':'Found something on Instagram or from a friend? Drop it in and it sits right alongside everything else.'}</div>
      <div class="fg"><label>What's it called?</label><input type="text" id="ownName" placeholder="${isStay?'e.g. Sultan Cave Suites':'e.g. that rooftop café Selin loved'}"></div>
      <div class="fg"><label>Google Maps link <span class="opt">— optional</span></label><input type="url" id="ownLink" placeholder="Paste a maps link"><div class="hint">Paste a link and it shows up as a pin on our map, and opens straight to the real place.</div></div>
      <div class="fg"><label>Pick an emoji</label><div class="emoji-row">${emo.map(e=>`<button class="emoji-opt ${e===selEmoji?'on':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('')}</div></div>
      <button class="form-add" onclick="addOwn(${isStay})">${isStay?'🛏 Set as where we sleep':'＋ Add to '+dShort(d)}</button></div></div>`;
  }else{
    let ids,filters='';
    if(isStay){ids=staysFor(d)}
    else{
      ids=(REGION_ACT[d.region]||CP_IDS).slice();
      if(d.region==='capp'){filters=`<div class="sh-filters">${CP_CATS.filter(c=>c!=='Stay').map(c=>`<button class="fchip ${c===sheetFilter?'on':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}</div>`;
        if(sheetFilter!=='All'&&CP_CATMAP[sheetFilter])ids=ids.filter(id=>P[id].cat===CP_CATMAP[sheetFilter])}
      else if(d.region==='afyon'){filters=`<div class="sh-filters">${AF_ACT_CATS.map(c=>`<button class="fchip ${c===sheetFilter?'on':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}</div>`;
        if(sheetFilter!=='All'&&AF_CATMAP[sheetFilter])ids=ids.filter(id=>P[id].cat===AF_CATMAP[sheetFilter])}
    }
    ids=byRating(ids);
    const list=ids.map(id=>{const p=P[id];
      const added=isStay?state.sleep[activeDay]===id:state.itin[activeDay].includes(id);
      const btn=added?`<button class="ic-add done" onclick="event.stopPropagation();${isStay?`setStay('${id}')`:`removeById('${id}')`}">${isStay?'✓ Staying':'✓ Added'}</button>`:`<button class="ic-add ${isStay?'htl':''}" onclick="event.stopPropagation();${isStay?`setStay('${id}')`:`addItem('${id}')`}">${isStay?'🛏 Stay':'＋ Add'}</button>`;
      return `<div class="icard" onclick="openDetail('${id}',${isStay})"><div class="ic-cover" style="${coverStyle(p)}">${p.photo?'':p.em}</div><div class="ic-inf"><div class="ic-name">${p.name}</div><div class="ic-det">${p.r?`<span class="ic-rat">${p.r} ★</span>`:''}<span class="ic-pill">${p.pill||''}</span></div><div class="ic-bl">${p.bl||''}</div></div>${btn}</div>`}).join('');
    content=filters+`<div class="sh-scroll">${list||'<div style="text-align:center;color:var(--ink-faint);padding:30px;font-size:13px">Nothing here yet — try “Add your own”.</div>'}</div>`;
  }
  document.getElementById('sheet').innerHTML=head+content;
}

/* ===================== DETAIL ===================== */
function openDetail(id,asStay){detailId=id;detailStay=asStay;renderDetail();document.getElementById('detailOv').classList.add('open')}
function closeDetail(){document.getElementById('detailOv').classList.remove('open')}
function renderDetail(){
  const p=P[detailId];if(!p)return;const d=dObj(activeDay);
  const added=detailStay?state.sleep[activeDay]===detailId:state.itin[activeDay].includes(detailId);
  let primary,secondary='';
  if(detailStay){primary=added?`<button class="dt-primary done">✓ We're staying here on ${dShort(d)}</button>`:`<button class="dt-primary stay" onclick="setStay('${detailId}');closeDetail()">🛏 Stay here on ${dShort(d)}</button>`;if(added)secondary=`<button class="dt-secondary" onclick="openSheet('stay');closeDetail()">Choose somewhere else</button>`}
  else{primary=added?`<button class="dt-primary done">✓ Added to ${dShort(d)}</button>`:`<button class="dt-primary" onclick="addItem('${detailId}');renderDetail()">＋ Add to ${dShort(d)}</button>`;if(added)secondary=`<button class="dt-secondary" onclick="removeById('${detailId}');renderDetail()">Remove from ${dShort(d)}</button>`}
  document.getElementById('detailOv').innerHTML=`
    <button class="dt-back" onclick="closeDetail()">‹</button>${p.pill?`<span class="dt-pill">${p.pill}</span>`:''}
    <div class="dt-scroll">
      <div class="dt-cover ${p.photo?'hasphoto':''}" style="${coverStyle(p)}"><div class="glow"></div><span class="em">${p.em}</span></div>
      <div class="dt-body"><div class="dt-name">${p.name}</div>
        <div class="dt-meta">${p.r?`<span class="dt-rat">${p.r} ★</span>`:''}<span class="dt-cat">${isStayPlace(detailId)?'place to stay':(p.cat==='custom'?'your find':(CATNAME[p.cat]||p.cat))}</span></div>
        ${p.bl?`<div class="dt-bl">${p.bl}</div>`:'<div class="dt-bl" style="color:var(--ink-faint);font-style:italic">A place you added — tap below to drop it on the day.</div>'}
        <a class="dt-gmaps" href="${gmaps(detailId)}" target="_blank" rel="noopener"><span class="gi">📍</span><span class="gt"><span class="g1">Open in Google Maps</span><span class="g2">Photos, reviews, hours & booking</span></span><span class="ga">↗</span></a>
      </div></div>
    <div class="dt-foot">${primary}${secondary}</div>`;
}

/* ===================== MUTATIONS ===================== */
function refresh(){save();if(document.getElementById('dayScreen').classList.contains('active'))renderDay();renderWeek();if(mapOpen())renderMap()}
function addItem(id){if(!state.itin[activeDay].includes(id))state.itin[activeDay].push(id);save();renderDay();if(document.getElementById('sheet').classList.contains('open'))renderSheet();if(mapOpen())renderMap();toast(`Added to ${dObj(activeDay).date} <span class="tk">✓</span>`)}
function removeById(id){const a=state.itin[activeDay],i=a.indexOf(id);if(i>=0)a.splice(i,1);save();renderDay();if(document.getElementById('sheet').classList.contains('open'))renderSheet();if(mapOpen())renderMap()}
function moveItem(day,i,dir){const a=state.itin[day],n=i+dir;if(n<0||n>=a.length)return;[a[i],a[n]]=[a[n],a[i]];save();renderDay();if(mapOpen())renderMap()}
function rmItem(day,i){state.itin[day].splice(i,1);save();renderDay();if(mapOpen())renderMap()}
function clearDay(){state.itin[activeDay]=[];save();renderDay();if(mapOpen())renderMap()}
function setStay(id){state.sleep[activeDay]=id;save();renderDay();renderWeek();if(document.getElementById('sheet').classList.contains('open'))closeSheet();if(mapOpen())renderMap();toast(`Staying at ${P[id].name} <span class="tk">✓</span>`)}
function toggleFlex(v){state.flex=v;if(v!=='cappadocia'){const t=state.sleep.d6;if(t&&P[t]&&!isStayPlace(t))state.sleep.d6=''}save();renderWeek();if(document.getElementById('dayScreen').classList.contains('active'))renderDay();if(mapOpen())renderMap()}
function parseLatLng(u){if(!u)return null;let m=u.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)||u.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/)||u.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/)||u.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);return m?[parseFloat(m[1]),parseFloat(m[2])]:null}
function addOwn(asStay){
  const name=val('ownName');if(!name){toast('Give it a name first');return}
  const link=val('ownLink'),ll=parseLatLng(link),c=REGION_CENTER[dObj(activeDay).region]||REGION_CENTER.capp;
  const id='cu'+(++customN);
  P[id]={name,em:selEmoji,cat:asStay?'hotel':'custom',views:[dObj(activeDay).region],r:'',pill:asStay?'Your pick':'Your find',bl:'',url:link||'',lat:ll?ll[0]:c[0]+(Math.random()-.5)*.05,lng:ll?ll[1]:c[1]+(Math.random()-.5)*.05};
  if(asStay)state.sleep[activeDay]=id;else state.itin[activeDay].push(id);
  save();renderDay();closeSheet();if(mapOpen())renderMap();
  toast(`${selEmoji} ${name} ${asStay?'— where we sleep':'added'} <span class="tk">✓</span>`)
}
function applyPreset(key){const pr=CAPP_PRESETS[key];if(!pr)return;
  state.itin.d3=pr.d3.slice();state.itin.d4=pr.d4.slice();state.itin.d5=pr.d5.slice();
  if(state.flex==='cappadocia')state.itin.d6=pr.d6.slice();
  ['d2','d3','d4','d5'].forEach(dd=>state.sleep[dd]=pr.hotel);if(state.flex==='cappadocia')state.sleep.d6=pr.hotel;
  save();renderWeek();if(mapOpen())renderMap();toast(`🎈 ${pr.name} added — staying at ${P[pr.hotel].name} <span class="tk">✓</span>`)}
function presetHome(){state.flex='home';state.itin.d6=['hm_beypazari','hm_nallihan'];state.sleep.d6='hm_goynuk';state.itin.d7=['hm_tarakli'];save();renderWeek();if(mapOpen())renderMap();toast('🧭 Suggested way home added <span class="tk">✓</span>')}
function clearAll(){if(!confirm('Clear everything and start fresh?'))return;DAYS.forEach(d=>{state.itin[d.id]=[];state.sleep[d.id]=''});state.flex='home';save();renderWeek();if(mapOpen())renderMap();toast('Cleared — a fresh start <span class="tk">✓</span>')}

/* ===================== NAV ===================== */
function showDay(id){activeDay=id;renderDay();document.getElementById('weekScreen').className='screen behind';document.getElementById('dayScreen').className='screen active'}
function showWeek(){renderWeek();document.getElementById('dayScreen').className='screen ahead';document.getElementById('weekScreen').className='screen active'}

/* ===================== MAP (Leaflet) ===================== */
const MAP_TABS=[['day','📍 This day'],['trip','🗺 Whole trip'],['capp','Cappadocia'],['afyon','Afyon'],['road','The road'],['home','Way home']];
function renderMapTabs(){document.getElementById('mapTabs').innerHTML=MAP_TABS.map(t=>`<button class="map-tab ${t[0]===mapView?'on':''}" onclick="setMapView('${t[0]}')">${t[1]}</button>`).join('')}
function initMap(){if(mapReady)return;map=L.map('lmap',{zoomControl:true,attributionControl:true}).setView([38.9,33],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);lineLayer=L.layerGroup().addTo(map);mapReady=true}
function placesForView(){
  if(mapView==='day'){const d=dObj(activeDay);const ids=state.itin[activeDay].slice();const sl=state.sleep[activeDay];if(sl&&P[sl])ids.push(sl);
    if(ids.length)return ids;return Object.keys(P).filter(id=>(P[id].views||[]).includes(d.region))}
  return Object.keys(P).filter(id=>(P[id].views||[]).includes(mapView))}
function popupHTML(id){const p=P[id],d=dObj(activeDay);
  const act=isStayPlace(id)?`<button class="pa-add stay" onclick="setStay('${id}');map.closePopup()">🛏 Stay · ${dShort(d)}</button>`:(p.cat==='route'?'':`<button class="pa-add" onclick="addToActiveFromMap('${id}');map.closePopup()">＋ ${dShort(d)}</button>`);
  return `<div class="pop"><h4>${p.em} ${p.name}</h4><div class="pm">${p.meta||p.kind||''}</div>${p.bl?`<p>${p.bl}</p>`:''}<div class="pa"><a href="${gmaps(id)}" target="_blank" rel="noopener">↗ Maps</a>${act}</div></div>`}
function addToActiveFromMap(id){if(!state.itin[activeDay].includes(id))state.itin[activeDay].push(id);save();renderWeek();renderMap();toast(`Added to ${dObj(activeDay).date} <span class="tk">✓</span>`)}
function renderMap(){if(!mapReady)return;markersLayer.clearLayers();lineLayer.clearLayers();
  const dayMode=mapView==='day',hasRoute=dayMode&&state.itin[activeDay].length>0,ids=placesForView();
  const drawLine=(arr,opts)=>{const pts=arr.filter(id=>P[id]).map(id=>[P[id].lat,P[id].lng]);if(pts.length>1)L.polyline(pts,opts).addTo(lineLayer)};
  if(mapView==='trip'){drawLine(OUT_LINE,{color:'#ff6b5a',weight:4});drawLine(RET_LINE,{color:'#f6a83f',weight:3,dashArray:'3 8'})}
  else if(mapView==='road'){drawLine(ROAD_LINE,{color:'#ff6b5a',weight:4})}
  else if(mapView==='home'){drawLine(RET_LINE,{color:'#f6a83f',weight:3,dashArray:'3 8'})}
  else if(hasRoute){drawLine(state.itin[activeDay],{color:'#ff6b5a',weight:3,dashArray:'6 6'})}
  ids.forEach((id,i)=>{const p=P[id];if(!p||p.lat==null)return;
    const m=L.circleMarker([p.lat,p.lng],{radius:p.cat==='route'?9:(isStayPlace(id)?8:7),color:'#fff',weight:2,fillColor:isStayPlace(id)?'#4a57c8':col(p.cat),fillOpacity:.96});
    m.addTo(markersLayer);m.bindPopup(popupHTML(id),{maxWidth:262});
    if(hasRoute)m.bindTooltip(String(i+1),{permanent:true,direction:'center',className:'mnum'});else m.bindTooltip(`${p.em} ${p.name}`,{direction:'top',offset:[0,-4]})});
  let fitIds=ids;const cappFrame=mapView==='capp'||(dayMode&&!hasRoute&&dObj(activeDay).region==='capp');
  if(cappFrame)fitIds=ids.filter(id=>id!=='cp6'&&id!=='cp12');
  const pts=fitIds.filter(id=>P[id]&&P[id].lat!=null).map(id=>[P[id].lat,P[id].lng]);
  const doFit=()=>{map.invalidateSize(false);if(pts.length>1)map.fitBounds(L.latLngBounds(pts),{padding:[26,26],maxZoom:14,animate:false});else if(pts.length===1)map.setView(pts[0],13,{animate:false})};
  doFit();setTimeout(doFit,180);renderMapInfo()}
function renderMapInfo(){const box=document.getElementById('mapInfo');
  if(mapView==='day'){const it=state.itin[activeDay].filter(id=>P[id]),sl=state.sleep[activeDay];
    if(!it.length&&!(sl&&P[sl])){box.innerHTML=`<div class="mi-empty">Add stops to this day to see them in order, with the driving distance. Tap any pin for details.</div>`;return}
    let rows=it.map((id,i)=>`<div class="mi-row"><span class="mi-num">${i+1}</span><span class="mi-nm">${P[id].em} ${P[id].name}</span><a class="mi-go" href="${gmaps(id)}" target="_blank" rel="noopener">Maps ↗</a></div>`).join('');
    if(sl&&P[sl])rows+=`<div class="mi-row"><span class="mi-num bed">🛏</span><span class="mi-nm">${P[sl].name}</span><a class="mi-go" href="${gmaps(sl)}" target="_blank" rel="noopener">Maps ↗</a></div>`;
    const km=dayKm(activeDay);box.innerHTML=rows+`<div class="mi-tot">${km?`≈ ${km} km driving · `:''}tap a pin, or any “Maps ↗”, to open the real place</div>`}
  else{box.innerHTML=`<div class="mi-legend"><span><i style="background:#ff6b5a"></i>Drive east</span><span><i style="background:#f6a83f"></i>The way home</span><span><i style="background:#4a57c8"></i>Where we sleep</span></div><div class="mi-tot" style="text-align:center">Tap any pin for details and a link to the real Google Maps place.</div>`}}
function setMapView(v){mapView=v;renderMapTabs();document.getElementById('mapTitle').textContent=v==='day'?dObj(activeDay).date:({trip:'Our whole journey',capp:'Cappadocia',afyon:'Afyon & around',road:'The drive east',home:'The way home'})[v]||'Our map';renderMap()}
function openMap(v){document.getElementById('mapOv').classList.add('open');initMap();mapView=v||'trip';renderMapTabs();setMapView(mapView);setTimeout(()=>{map.invalidateSize();renderMap()},130)}
function closeMap(){document.getElementById('mapOv').classList.remove('open')}

/* ===================== SHARE + PERSISTENCE ===================== */
function save(){state.saved=undefined;try{localStorage.setItem(LS,JSON.stringify({flex:state.flex,itin:state.itin,sleep:state.sleep,custom:dumpCustom()}))}catch(e){}}
function dumpCustom(){const o={};Object.keys(P).forEach(id=>{if(id.startsWith('cu'))o[id]=P[id]});return o}
function encState(){return btoa(unescape(encodeURIComponent(JSON.stringify({flex:state.flex,itin:state.itin,sleep:state.sleep,custom:dumpCustom()}))))}
function decState(s){return JSON.parse(decodeURIComponent(escape(atob(s))))}
function shareLink(){return location.origin+location.pathname+'#p='+encState()}
function openShare(){document.getElementById('shareUrl').textContent=shareLink();document.getElementById('shareModal').classList.add('open')}
function closeShare(){document.getElementById('shareModal').classList.remove('open')}
function copyShare(){const u=shareLink();if(navigator.clipboard)navigator.clipboard.writeText(u).catch(()=>{});toast('Link copied <span class="tk">✓</span>');closeShare()}
function nativeShare(){const u=shareLink();if(navigator.share)navigator.share({title:'Türkiye, the two of us',text:'Our trip plan 🤍',url:u}).catch(()=>{});else copyShare()}
function applyState(s){state={flex:(s&&s.flex==='cappadocia')?'cappadocia':'home',itin:{},sleep:{}};
  if(s&&s.custom)Object.keys(s.custom).forEach(id=>{P[id]=s.custom[id];const n=parseInt(id.slice(2));if(n>customN)customN=n});
  DAYS.forEach(d=>{state.itin[d.id]=(s&&s.itin&&Array.isArray(s.itin[d.id]))?s.itin[d.id].filter(x=>P[x]):[];state.sleep[d.id]=(s&&s.sleep&&P[s.sleep[d.id]])?s.sleep[d.id]:''})}
function init(){
  let loaded=null;
  if(location.hash.indexOf('#p=')===0){try{loaded=decState(location.hash.slice(3))}catch(e){}}
  if(!loaded){try{const r=localStorage.getItem(LS);if(r)loaded=JSON.parse(r)}catch(e){}}
  applyState(loaded||{});save();renderWeek();
  if(location.hash)history.replaceState(null,'',location.pathname);
}
window.addEventListener('load',init);
</script>
